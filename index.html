<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA INSUMEX - STOCK</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 5px solid #2c3e50; }
        input, select, button { padding: 10px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { cursor: pointer; font-weight: bold; background: #27ae60; color: white; border: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #ddd; }
        .resumen { display: flex; justify-content: space-around; background: #2c3e50; color: white; padding: 15px; border-radius: 8px; }
        .status { font-size: 12px; color: #7f8c8d; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>📦 Insumex: Control de Inventario</h1>
    <div id="conexion-status" class="status" style="color: orange;">⏳ Conectando a Firebase...</div>

    <div class="box">
        <h2>1. Registrar Compra</h2>
        <input type="date" id="f_fecha">
        <input type="text" id="f_nombre" placeholder="Nombre (ej: Carne)">
        <input type="number" id="f_total" placeholder="Costo Total $">
        <input type="number" id="f_cant" placeholder="Cantidad (kg/un)">
        <select id="f_unid"><option value="kg">kg</option><option value="un">un</option></select>
        <button id="btnCompra">REGISTRAR COMPRA</button>
        
        <table id="tabla_compras">
            <thead><tr><th>Fecha</th><th>Insumo</th><th>Cant.</th><th>Total</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="box">
        <h2>2. Registrar Gasto</h2>
        <select id="sel_insumos"><option value="">-- Seleccionar --</option></select>
        <input type="number" id="g_cant" placeholder="Cantidad usada">
        <button id="btnGasto" style="background: #e67e22;">CARGAR GASTO</button>
    </div>

    <div class="box">
        <h2>3. Stock en Heladera</h2>
        <table id="tabla_stock">
            <thead><tr><th>Insumo</th><th>Comprado</th><th>Gastado</th><th>En Stock</th><th>Valor $</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="resumen">
        <div>COMPRAS: <b id="r_compras">$0</b></div>
        <div>GASTADO: <b id="r_gastado">$0</b></div>
        <div>EN STOCK: <b id="r_stock">$0</b></div>
    </div>

    <button id="btnReset" style="background: #c0392b; margin-top: 20px; width: 100%;">⚠️ RESETEAR SISTEMA (Borra nube)</button>

    <script type="module">
        // URLs CORREGIDAS (con 'gstatic')
        import { initializeApp } from "https://gstatic.com";
        import { getDatabase, ref, set, push, onValue, remove } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyCDnMHlcO9JME_CBQDrawKGU6t1GIfGKWU",
            authDomain: "://firebaseapp.com",
            projectId: "insumex-a02f5",
            storageBucket: "insumex-a02f5.firebasestorage.app",
            messagingSenderId: "478815059725",
            appId: "1:478815059725:web:7fbb95307cab1fc86eba44",
            databaseURL: "https://insumex-a02f5-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db_firebase = getDatabase(app);
        const stockRef = ref(db_firebase, 'inventario');

        let db_local = { compras: {}, gastos: {} };

        onValue(stockRef, (snapshot) => {
            const statusDiv = document.getElementById("conexion-status");
            statusDiv.innerText = "✅ Conectado a Insumex Cloud";
            statusDiv.style.color = "green";
            
            const data = snapshot.val();
            if (data) {
                db_local.compras = data.compras || {};
                db_local.gastos = data.gastos || {};
            } else {
                db_local = { compras: {}, gastos: {} };
            }
            dibujarTodo();
        }, (error) => {
            const statusDiv = document.getElementById("conexion-status");
            statusDiv.innerText = "❌ Error de conexión: " + error.message;
            statusDiv.style.color = "red";
        });

        window.onload = () => document.getElementById('f_fecha').valueAsDate = new Date();

        document.getElementById("btnCompra").onclick = () => {
            const nom = document.getElementById("f_nombre").value.toUpperCase().trim();
            const tot = parseFloat(document.getElementById("f_total").value);
            const can = parseFloat(document.getElementById("f_cant").value);
            const fec = document.getElementById("f_fecha").value;
            const uni = document.getElementById("f_unid").value;

            if(!nom || isNaN(tot) || isNaN(can)) return alert("Completa los campos");

            const itemRef = push(ref(db_firebase, 'inventario/compras'));
            set(itemRef, { f: fec, n: nom, t: tot, c: can, u: uni, precioUnit: (tot/can) });

            document.getElementById("f_nombre").value = "";
            document.getElementById("f_total").value = "";
            document.getElementById("f_cant").value = "";
        };

        document.getElementById("btnGasto").onclick = () => {
            const nom = document.getElementById("sel_insumos").value;
            const can = parseFloat(document.getElementById("g_cant").value);
            if(!nom || isNaN(can)) return alert("Selecciona insumo y cantidad");

            const gastoRef = push(ref(db_firebase, 'inventario/gastos'));
            set(gastoRef, { n: nom, c: can });
            document.getElementById("g_cant").value = "";
        };

        document.getElementById("btnReset").onclick = () => {
            if(confirm("¿Borrar todo definitivamente?")) remove(stockRef);
        };

        function dibujarTodo() {
            const t_compras = document.querySelector("#tabla_compras tbody");
            const t_stock = document.querySelector("#tabla_stock tbody");
            const sel = document.getElementById("sel_insumos");
            
            t_compras.innerHTML = ""; t_stock.innerHTML = "";
            sel.innerHTML = '<option value="">-- Seleccionar --</option>';

            let sumC = 0, sumG = 0, sumS = 0;
            let inv = {};

            Object.values(db_local.compras).forEach(c => {
                sumC += c.t;
                t_compras.innerHTML += `<tr><td>${c.f}</td><td>${c.n}</td><td>${c.c}${c.u}</td><td>$${c.t.toFixed(2)}</td></tr>`;
                if(!inv[c.n]) inv[c.n] = { comp: 0, gast: 0, precio: c.precioUnit, med: c.u };
                inv[c.n].comp += c.c;
            });

            Object.values(db_local.gastos).forEach(g => {
                if(inv[g.n]) inv[g.n].gast += g.c;
            });

            Object.keys(inv).sort().forEach(n => {
                const item = inv[n];
                const stock = item.comp - item.gast;
                const valS = stock * item.precio;
                sumG += (item.gast * item.precio);
                sumS += valS;
                sel.innerHTML += `<option value="${n}">${n}</option>`;
                t_stock.innerHTML += `<tr><td><b>${n}</b></td><td>${item.comp.toFixed(2)}</td><td style='color:red'>-${item.gast.toFixed(2)}</td><td>${stock.toFixed(2)} ${item.med}</td><td style='color:green'>$${valS.toFixed(2)}</td></tr>`;
            });

            document.getElementById("r_compras").innerText = "$" + sumC.toFixed(2);
            document.getElementById("r_gastado").innerText = "$" + sumG.toFixed(2);
            document.getElementById("r_stock").innerText = "$" + sumS.toFixed(2);
        }
    </script>
</body>
</html>
