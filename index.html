<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiko's Burguer - Admin Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --kiko-neon-red: #ff003c;
            --kiko-neon-yellow: #ffbd00;
            --glass-bg: rgba(255, 255, 255, 0.85);
        }

        body {
            /* Fondo de hamburguesa realista */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1571091718767-18b5b1457add?q=80&w=2072&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
        }

        .navbar {
            background: var(--kiko-neon-red) !important;
            box-shadow: 0 4px 15px rgba(255, 0, 60, 0.4);
            border-radius: 0 0 25px 25px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 30px; /* Bordes muy redondeados */
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 25px;
            overflow: hidden;
        }

        .card-header {
            background: var(--kiko-neon-yellow) !important;
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            border: none;
            padding: 15px;
        }

        .btn-kiko {
            background: var(--kiko-neon-red);
            color: white;
            border-radius: 50px;
            font-weight: bold;
            padding: 12px;
            transition: 0.3s;
            border: none;
            text-transform: uppercase;
        }

        .btn-kiko:hover {
            background: #ff4d6d;
            transform: scale(1.05);
            color: white;
        }

        .table { background: transparent; }
        .badge-price {
            background: #2ecc71;
            font-size: 1.1rem;
            border-radius: 10px;
            padding: 8px 12px;
        }

        input.form-control {
            border-radius: 15px;
            border: 2px solid #eee;
            padding: 10px 15px;
        }

        input.form-control:focus {
            border-color: var(--kiko-neon-yellow);
            box-shadow: none;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-5">
    <div class="container justify-content-center">
        <h2 class="navbar-brand m-0 fw-bold" style="font-size: 1.8rem;">🍔 KIKO'S BURGUER ADMIN</h2>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-lg-4">
            <div class="card">
                <div class="card-header">🛒 Cargar Insumo</div>
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nombre</label>
                        <input type="text" id="ing-nombre" class="form-control" placeholder="Ej: Medallón 180g">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Precio ($)</label>
                        <input type="number" id="ing-precio" class="form-control" placeholder="0.00">
                    </div>
                    <button onclick="guardarIngrediente()" class="btn btn-kiko w-100">Guardar</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header text-dark" style="background: #fff !important;">Lista de Precios</div>
                <div class="card-body p-0">
                    <ul class="list-group list-group-flush" id="lista-ingredientes">
                        </ul>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card">
                <div class="card-header" style="background: #25d366 !important; color: white;">⚡ Calcular Costo de Hamburguesa</div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Nombre de la Burger</label>
                            <input type="text" id="prod-nombre" class="form-control" placeholder="Ej: La Kiko Monster">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Ingredientes (ID=Cant, ID=Cant)</label>
                            <input type="text" id="prod-receta" class="form-control" placeholder="Ej: 1=1, 2=150">
                        </div>
                    </div>
                    <button onclick="calcularProducto()" class="btn btn-dark w-100 mb-2" style="border-radius: 50px;">CALCULAR COSTO</button>
                </div>
            </div>

            <div class="card">
                <div class="table-responsive">
                    <table class="table align-middle mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th class="ps-4">Hamburguesa</th>
                                <th>Costo Final</th>
                                <th class="text-center">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-productos">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Usamos el almacenamiento del navegador (localStorage) en lugar de SQL
    // para que funcione 100% en GitHub Pages sin errores.
    let ingredientes = JSON.parse(localStorage.getItem('kiko_ings')) || [];
    let productos = JSON.parse(localStorage.getItem('kiko_prods')) || [];

    function guardarIngrediente() {
        const nombre = document.getElementById('ing-nombre').value;
        const precio = document.getElementById('ing-precio').value;
        
        if(!nombre || !precio) return alert("Completa los datos");

        const nuevo = { id: ingredientes.length + 1, nombre, precio: parseFloat(precio) };
        ingredientes.push(nuevo);
        localStorage.setItem('kiko_ings', JSON.stringify(ingredientes));
        actualizarUI();
        document.getElementById('ing-nombre').value = '';
        document.getElementById('ing-precio').value = '';
    }

    function calcularProducto() {
        const nombre = document.getElementById('prod-nombre').value;
        const recetaRaw = document.getElementById('prod-receta').value;

        if(!nombre || !recetaRaw) return alert("Completa los datos");

        let costoTotal = 0;
        const partes = recetaRaw.split(',');

        partes.forEach(p => {
            const [id, cant] = p.split('=');
            const ing = ingredientes.find(i => i.id == id.trim());
            if(ing) costoTotal += (ing.precio * parseFloat(cant));
        });

        productos.push({ nombre, costo: costoTotal });
        localStorage.setItem('kiko_prods', JSON.stringify(productos));
        actualizarUI();
    }

    function borrarTodo() {
        if(confirm("¿Borrar todo?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function actualizarUI() {
        // Actualizar Lista Ingredientes
        const lista = document.getElementById('lista-ingredientes');
        lista.innerHTML = ingredientes.map(i => `
            <li class="list-group-item d-flex justify-content-between p-3">
                <span><strong>ID ${i.id}:</strong> ${i.nombre}</span>
                <span class="badge bg-dark">$${i.precio}</span>
            </li>
        `).join('');

        // Actualizar Tabla Productos
        const tabla = document.getElementById('tabla-productos');
        tabla.innerHTML = productos.map(p => `
            <tr>
                <td class="ps-4 fw-bold text-uppercase">${p.nombre}</td>
                <td><span class="badge badge-price">$${p.costo.toFixed(2)}</span></td>
                <td class="text-center"><button class="btn btn-sm btn-danger rounded-circle" onclick="alert('Funcionalidad de borrar en desarrollo')">×</button></td>
            </tr>
        `).join('');
    }

    actualizarUI();
</script>

</body>
</html>
