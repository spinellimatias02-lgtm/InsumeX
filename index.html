<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SISTEMA DE STOCK</title>

<style>
body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
.box { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
input, select, button { padding: 10px; margin: 5px; }
button { background: #27ae60; color: white; border: none; cursor: pointer; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px; border-bottom: 1px solid #ddd; }
.resumen { display:flex; justify-content:space-around; background:#2c3e50; color:white; padding:10px;}
</style>
</head>

<body>

<h1>📦 Inventario</h1>

<div class="box">
<h2>Compra</h2>
<input type="date" id="f_fecha">
<input type="text" id="f_nombre">
<input type="number" id="f_total">
<input type="number" id="f_cant">
<select id="f_unid"><option value="kg">kg</option><option value="un">un</option></select>
<button onclick="registrarCompra()">OK</button>

<table>
<thead><tr><th>Fecha</th><th>Insumo</th><th>Cant</th><th>$</th><th></th></tr></thead>
<tbody id="tabla_compras"></tbody>
</table>
</div>

<div class="box">
<h2>Gasto</h2>
<select id="sel_insumos"></select>
<input type="number" id="g_cant">
<button onclick="registrarGasto()">OK</button>
</div>

<div class="box">
<h2>Stock</h2>
<table>
<thead><tr><th>Insumo</th><th>Comp</th><th>Gast</th><th>Stock</th><th>$</th></tr></thead>
<tbody id="tabla_stock"></tbody>
</table>
</div>

<div class="resumen">
<div>Compras: <b id="r_compras">$0</b></div>
<div>Gastado: <b id="r_gastado">$0</b></div>
<div>Stock: <b id="r_stock">$0</b></div>
</div>

<button onclick="reiniciarTodo()" style="background:red;width:100%">RESET</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCDnMHlcO9JME_CBQDrawKGU6t1GIfGKWU",
  authDomain: "insumex-a02f5.firebaseapp.com",
  databaseURL: "https://insumex-a02f5-default-rtdb.firebaseio.com",
  projectId: "insumex-a02f5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let compras = [];
let gastos = [];

window.onload = () => {
    document.getElementById('f_fecha').valueAsDate = new Date();
    escuchar();
};

function escuchar() {
    onValue(ref(db), (snap) => {
        const data = snap.val() || {};

        compras = [];
        gastos = [];

        if(data.compras){
            Object.keys(data.compras).forEach(id=>{
                compras.push({id,...data.compras[id]});
            });
        }

        if(data.gastos){
            Object.keys(data.gastos).forEach(id=>{
                gastos.push({id,...data.gastos[id]});
            });
        }

        render();
    });
}

window.registrarCompra = async () => {
    let nom = f_nombre.value.toUpperCase().trim();
    let tot = parseFloat(f_total.value);
    let can = parseFloat(f_cant.value);
    let fec = f_fecha.value;
    let uni = f_unid.value;

    if(!nom || isNaN(tot) || isNaN(can)) return;

    await push(ref(db,"compras"),{
        f:fec,n:nom,t:tot,c:can,u:uni,precioUnit:(tot/can)
    });

    f_nombre.value="";
    f_total.value="";
    f_cant.value="";
};

window.registrarGasto = async () => {
    let nom = sel_insumos.value;
    let can = parseFloat(g_cant.value);
    if(!nom || isNaN(can)) return;

    await push(ref(db,"gastos"),{n:nom,c:can});
    g_cant.value="";
};

window.eliminarCompra = (id)=>{
    remove(ref(db,"compras/"+id));
};

window.reiniciarTodo = ()=>{
    if(confirm("Borrar todo?")){
        remove(ref(db));
    }
};

function render(){
    tabla_compras.innerHTML="";
    tabla_stock.innerHTML="";
    sel_insumos.innerHTML='<option value="">--</option>';

    let inv={};
    let sumC=0,sumG=0,sumS=0;

    compras.forEach(c=>{
        sumC+=c.t;

        tabla_compras.innerHTML+=`
        <tr>
        <td>${c.f}</td>
        <td>${c.n}</td>
        <td>${c.c}${c.u}</td>
        <td>$${c.t}</td>
        <td><button onclick="eliminarCompra('${c.id}')" style="background:red">X</button></td>
        </tr>`;

        if(!inv[c.n]) inv[c.n]={comp:0,gast:0,precio:c.precioUnit,med:c.u};
        inv[c.n].comp+=c.c;
    });

    gastos.forEach(g=>{
        if(inv[g.n]) inv[g.n].gast+=g.c;
    });

    Object.keys(inv).forEach(n=>{
        let i=inv[n];
        let stock=i.comp-i.gast;
        let val=stock*i.precio;

        sumG+=i.gast*i.precio;
        sumS+=val;

        sel_insumos.innerHTML+=`<option value="${n}">${n}</option>`;
        tabla_stock.innerHTML+=`
        <tr>
        <td>${n}</td>
        <td>${i.comp}</td>
        <td style="color:red">-${i.gast}</td>
        <td>${stock}</td>
        <td style="color:green">$${val.toFixed(2)}</td>
        </tr>`;
    });

    r_compras.innerText="$"+sumC.toFixed(2);
    r_gastado.innerText="$"+sumG.toFixed(2);
    r_stock.innerText="$"+sumS.toFixed(2);
}
</script>

</body>
</html>
